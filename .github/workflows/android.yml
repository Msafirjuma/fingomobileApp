name: Build NativePHP Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger the build manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: dom, curl, libxml, mbstring, zip, pcntl

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Java (Required for Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Composer Dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Copy .env File
      run: cp .env.example .env

    - name: Generate App Key
      run: php artisan key:generate

    - name: Install NPM Dependencies & Build Assets
      run: |
        npm install
        npm run build

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true    

    - name: Run NativePHP Mobile Build
      run: |
       rm -f native
       php artisan native:install android --no-interaction

       sed -i 's/REPLACE_COMPILE_SDK/34/g' nativephp/android/app/build.gradle.kts
       sed -i 's/REPLACE_MIN_SDK/24/g' nativephp/android/app/build.gradle.kts
       sed -i 's/REPLACE_TARGET_SDK/34/g' nativephp/android/app/build.gradle.kts
       sed -i 's/REPLACEMECODE/1/g' nativephp/android/app/build.gradle.kts
       sed -i 's/REPLACE_MINIFY_ENABLED/false/g' nativephp/android/app/build.gradle.kts
       sed -i 's/REPLACE_SHRINK_RESOURCES/false/g' nativephp/android/app/build.gradle.kts
       
       php artisan native:package android --no-interaction --no-tty

    - name: Print NativePHP Build Logs on Failure
      if: always()
      run: |
        echo "=== Checking NativePHP Log Files ==="
        if [ -f nativephp/android-build.log ]; then
          cat nativephp/android-build.log
        else
          echo "No android-build.log file found."
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mkusa-electronics-v1.0-debug
        path: |
          **/build/outputs/apk/debug/*.apk
          **/*.apk
        if-no-files-found: error
